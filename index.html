
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HEYIWEN | Experience Designer Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/puhuifont@1.0.0/index.css">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Space Grotesk', 'system-ui', 'sans-serif'],
              serif: ['Noto Serif SC', 'serif'],
              display: ['Space Grotesk', 'sans-serif'],
              puhui: ['Alibaba PuHuiTi', 'sans-serif'],
            },
            colors: {
              bg: '#FAFAFA', /* 稍微提亮一点背景 */
              primary: '#050505',
              accent: '#FF3E00',
              dim: '#888888',
              surface: '#F2F2F2',
            },
            animation: {
              'reveal': 'reveal 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'fade-up': 'fadeUp 1.0s cubic-bezier(0.22, 1, 0.36, 1) forwards',
              'marquee': 'marquee 30s linear infinite',
            },
            keyframes: {
              reveal: {
                '0%': { transform: 'translateY(100%)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              },
              fadeUp: {
                '0%': { transform: 'translateY(20px)', opacity: 0 },
                '100%': { transform: 'translateY(0)', opacity: 1 },
              },
              fadeIn: {
                '0%': { opacity: 0 },
                '100%': { opacity: 1 },
              },
              marquee: {
                '0%': { transform: 'translateX(0%)' },
                '100%': { transform: 'translateX(-50%)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        cursor: none;
        background-color: #FAFAFA;
        color: #050505;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        overflow-x: hidden;
      }
      
      /* 添加噪点纹理，提升高级感 */
      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 9998;
      }

      .text-outline {
        -webkit-text-stroke: 1px rgba(0,0,0,0.15);
        color: transparent;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      
      ::selection {
        background: #000;
        color: #fff;
      }

      html { scroll-behavior: smooth; }
      
      .font-puhui {
        font-family: "Alibaba PuHuiTi", sans-serif;
      }

      .perspective-2000 {
        perspective: 2000px;
      }
      
      @keyframes image-zoom {
        from { transform: scale(1.05); }
        to { transform: scale(1.1); }
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "vite": "https://esm.sh/vite@^7.3.1",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react-dom": "https://esm.sh/react-dom@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "@vitejs/plugin-react": "https://esm.sh/@vitejs/plugin-react@^5.1.4"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
